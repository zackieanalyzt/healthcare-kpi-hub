name: CI

on:
  push:
    branches:
      - main
      - "feature/**"
      - "fix/**"
      - "docs/**"
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.16"

      - name: Install Dependencies
        run: bun install

      - name: Typecheck
        run: bun run typecheck

      - name: Lint
        run: bun run lint

      - name: Test
        run: bun run test

      - name: Build Web
        run: bun run build:web

      - name: Run Migrations
        run: bun run db:migrate

      - name: Run Seeds
        run: bun run db:seed
